name: motion_correction
channels:
  - conda-forge
  - defaults
dependencies:
  - python >= 3.11,<3.12
  - tifffile
  - pytorch >= 1.13.1
  - torchvision
  - numpy >= 1.24.3
  - numba >= 0.57.0
  - scipy >= 1.9.0
  - scikit-learn
  - qtpy
  - superqt
  - pyqt6
  - pyqt6-sip
  - pyqtgraph
  - paramiko
  - pip
  - nd2
  - h5py
  - xmltodict
  - natsort
  - tqdm
  - pip:
    - dcimg
    - opencv-python-headless
    - sbxreader
    - scanimage-tiff-reader >= 1.4.1
    - -e.
